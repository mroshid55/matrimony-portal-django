{% load static %} {% block content %}
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, shrink-to-fit=no"
    />
    <meta name="description" content />
    <meta name="author" content />
    <link rel="icon" type="image/png" href="img/fav.png" />
    <title>Matrimony Portal</title>

    <link
      href="{% static 'asset/vendor/slick/slick.min.css' %}"
      rel="stylesheet"
      type="text/css"
    />
    <link
      href="{% static 'asset/vendor/slick/slick-theme.min.css' %}"
      rel="stylesheet"
      type="text/css"
    />

    <link
      href="{% static 'asset/vendor/icons/feather.css' %}"
      rel="stylesheet"
      type="text/css"
    />

    <link
      href="{% static 'asset/vendor/bootstrap/css/bootstrap.min.css' %}"
      rel="stylesheet"
    />

    <link href="{% static 'asset/css/style.css' %}" rel="stylesheet" />
  </head>
  <body>
    <div class="bg-white">
      <div class="container">
        <div
          class="row justify-content-center align-items-center d-flex vh-100"
        >
          <div class="col-md-4 mx-auto">
            <div class="osahan-login py-4">
              <div class="text-center mb-4">
                <a href="index.html"><img src="img/logo.svg" alt /></a>
                <h5 class="font-weight-bold mt-3">Welcome Back</h5>
                <p class="text-muted">
                  Don't miss your next opportunity. Sign in to stay updated on
                  your professional world.
                </p>
              </div>
              <form method="POST" action="{% url 'login' %}">
                {% csrf_token %}
                <div class="form-group">
                  <label class="mb-1">User Name</label>
                  <div class="position-relative icon-form-control">
                    <i class="feather-user position-absolute"></i>
                    <input type="text" class="form-control" name="username" />
                  </div>
                </div>
                <div class="form-group">
                  <label class="mb-1">Password</label>
                  <div class="position-relative icon-form-control">
                    <i class="feather-unlock position-absolute"></i>
                    <input
                      type="password"
                      class="form-control"
                      name="password"
                    />
                  </div>
                </div>
                <div class="custom-control custom-checkbox mb-3">
                  <input
                    type="checkbox"
                    class="custom-control-input"
                    id="customCheck1"
                  />
                  <label class="custom-control-label" for="customCheck1"
                    >Remember password</label
                  >
                </div>
                <button
                  class="btn btn-primary btn-block text-uppercase"
                  type="submit"
                >
                  Sign in
                </button>
                <div class="text-center mt-3 border-bottom pb-3">
                  <p class="small text-muted">Or login with</p>
                  <div class="row">
                    <div class="col-4">
                      <button
                        type="button"
                        class="btn btn-sm btn-outline-instagram btn-block"
                      >
                        <i class="feather-instagram"></i> Instagram
                      </button>
                    </div>
                    <div class="col-4">
                      <button
                        type="button"
                        class="btn btn-sm btn-outline-linkedin btn-block"
                      >
                        <i class="feather-linkedin"></i> Linkedin
                      </button>
                    </div>
                    <div class="col-4">
                      <button
                        type="button"
                        class="btn btn-sm btn-outline-facebook btn-block"
                      >
                        <i class="feather-facebook"></i> Facebook
                      </button>
                    </div>
                  </div>
                </div>
                <div class="py-3 d-flex align-item-center">
                  <a href="forgot-password.html">Forgot password?</a>
                  <span class="ml-auto">
                    Don't have an account?
                    <a class="font-weight-bold" href="{% url 'register' %}"
                      >Join now</a
                    ></span
                  >
                </div>
              </form>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script
      src="{% static 'asset/vendor/jquery/jquery.min.js' %}"
      type="text/javascript"
    ></script>
    <script
      src="{% static 'asset/vendor/bootstrap/js/bootstrap.bundle.min.js' %}"
      type="text/javascript"
    ></script>
    <script
      src="{% static 'asset/vendor/slick/slick.min.js' %}"
      type="text/javascript"
    ></script>
    <script
      src="{% static 'asset/js/osahan.js' %}"
      type="text/javascript"
    ></script>
  </body>
</html>

{% endblock %}
